server {
    listen 8108;
    server_name _;

    # ─── Archivos estáticos del build de React ─────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ─── Rutas de la API → microservicios ─────────────────────────────────
    # IMPORTANTE: la barra final en proxy_pass elimina el prefijo /api/<svc>
    # antes de reenviar la petición al contenedor del servicio.

    location /api/vehiculos/ {
        proxy_pass         http://vehiculos:3001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/rutas/ {
        proxy_pass         http://rutas:3002/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/ubicacion/ {
        proxy_pass         http://ubicacion:3003/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/seguimiento/ {
        proxy_pass         http://seguimiento:3004/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/analitica/ {
        proxy_pass         http://analitica:3005/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    location /api/notificaciones/ {
        proxy_pass         http://notificaciones:3006/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ─── SPA fallback: cualquier ruta desconocida → index.html ────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
