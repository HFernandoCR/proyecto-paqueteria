services:

  # ─── Base de datos ─────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Microservicios backend ─────────────────────────────────────────────────
  vehiculos:
    build: ./backend/vehiculos
    container_name: vehiculos
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongo:27017/db_vehiculos
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rutas:
    build: ./backend/rutas
    container_name: rutas
    restart: unless-stopped
    environment:
      - PORT=3002
      - MONGO_URI=mongodb://mongo:27017/db_rutas
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ubicacion:
    build: ./backend/ubicacion
    container_name: ubicacion
    restart: unless-stopped
    environment:
      - PORT=3003
      - MONGO_URI=mongodb://mongo:27017/db_ubicacion
      - RUTAS_SERVICE_URL=http://rutas:3002
    depends_on:
      mongo:
        condition: service_healthy
      rutas:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  seguimiento:
    build: ./backend/seguimiento
    container_name: seguimiento
    restart: unless-stopped
    environment:
      - PORT=3004
      - MONGO_URI=mongodb://mongo:27017/db_seguimiento
      - UBICACION_SERVICE_URL=http://ubicacion:3003
      - VEHICULOS_SERVICE_URL=http://vehiculos:3001
    depends_on:
      mongo:
        condition: service_healthy
      ubicacion:
        condition: service_healthy
      vehiculos:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  analitica:
    build: ./backend/analitica
    container_name: analitica
    restart: unless-stopped
    environment:
      - PORT=3005
      - MONGO_URI=mongodb://mongo:27017/db_analitica
      - UBICACION_SERVICE_URL=http://ubicacion:3003
      - VEHICULOS_SERVICE_URL=http://vehiculos:3001
    depends_on:
      mongo:
        condition: service_healthy
      ubicacion:
        condition: service_healthy
      vehiculos:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notificaciones:
    build: ./backend/notificaciones
    container_name: notificaciones
    restart: unless-stopped
    environment:
      - PORT=3006
      - MONGO_URI=mongodb://mongo:27017/db_notificaciones
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ─── Reverse proxy + frontend estático ────────────────────────────────────
  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile
    container_name: proxy
    restart: unless-stopped
    ports:
      - "8108:8108"
    depends_on:
      vehiculos:
        condition: service_healthy
      rutas:
        condition: service_healthy
      ubicacion:
        condition: service_healthy
      seguimiento:
        condition: service_healthy
      analitica:
        condition: service_healthy
      notificaciones:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8108/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─── Volúmenes y redes ────────────────────────────────────────────────────────
volumes:
  mongo_data:

networks:
  backend_net:
    driver: bridge
